version: '3.8'

services:
  video-organizer:
    build:
      context: .
      dockerfile: Dockerfile.run
    container_name: video-organizer
    restart: unless-stopped
    volumes:
      # 挂载视频目录 - 修改为你实际的路径
      - /path/to/your/videos:/app/videos
      # 挂载配置文件（可选）
      - ./config.ini:/app/config.ini:ro
    environment:
      - TZ=Asia/Shanghai
    command: python run_organizer.py

  # 开发模式 - 带有代码热重载
  video-organizer-dev:
    build:
      context: .
      dockerfile: Dockerfile.run
    container_name: video-organizer-dev
    volumes:
      - ./src:/app/src
      - ./config.ini:/app/config.ini:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
    command: python -c "from src.video_organizer.main import main; main()"