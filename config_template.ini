[monitoring]
supported_extensions = .mp4,.mkv,.avi,.mov,.wmv,.flv,.strm
; 路径映射：将下载器返回的路径映射到主机实际路径
path_mappings = /downloads:/data-lv1/bt_strm/downloads

[emos]
auth_token = 
base_url = https://emos.lol
; 文件存储类型: internal (内部存储) 或 global (全局存储)
file_storage = internal
; 分片大小(MB)，范围: 10-200，默认: 50
chunk_size_mb = 50

[processing] 
delete_after_upload = True
; 最大并发上传工作线程数，默认1（顺序上传），可根据资源情况调整
max_upload_workers = 1

[logging]
log_level = INFO
log_file = 
console_log = True
file_log = False

