[monitoring]
; watch_dir = /mnt/media/test
; watch_dir = F:\XunLeiDownLoad\FDM
; output_dir = /mnt/media/processed
; poll_interval = 10
supported_extensions = .mp4,.mkv,.avi,.mov,.wmv,.flv
; use_polling = False
; polling_interval = 5
; 路径映射：将下载器返回的路径映射到主机实际路径
; path_mappings = F:\\XunLeiDownLoad\\media:F:\\XunLeiDownLoad\\media

[naming]
; tv_show_format = {show_name}/Season {season:02d}/{show_name} - S{season:02d}E{episode:02d} - {episode_name}
; tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}
tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}{release_group_suffix}
movie_format = Movies/{show_name} ({year}) {tmdbid=tmdbid}/{show_name} {quality_tags}{release_group_suffix}
; anime_format = Anime/{show_name}/{show_name} - {episode:03d}
simple_format = {title}

[tmdb]
api_key = 
language = zh-CN
region = CN
retry_count = 3
timeout = 30

; LLM 兜底识别配置（当 TMDB/正则无法识别时使用）
[llm_fallback]
enabled = False
max_concurrent = 2

; ===== Provider 1: 智谱 GLM =====
[llm_provider_1]
name = GLM
api_url = https://open.bigmodel.cn/api/paas/v4/chat/completions
api_key = 
model = glm-4-flash
enabled = True
weight = 1
timeout = 30
max_retries = 2

; ===== Provider 2: DeepSeek =====
[llm_provider_2]
name = DeepSeek
api_url = https://api.deepseek.com/v1/chat/completions
api_key = sk-xxx
model = deepseek-chat
enabled = False
weight = 1
timeout = 30
max_retries = 2

; ===== Provider 3: OpenAI =====
[llm_provider_3]
name = OpenAI
api_url = https://api.openai.com/v1/chat/completions
api_key = sk-xxx
model = gpt-4o-mini
enabled = False
weight = 1
timeout = 30
max_retries = 2

; GuessIt 增强识别配置
; GuessIt 是一个专业的视频文件名解析库，能够从文件名中提取丰富的元数据
; 启用后可以显著提高识别准确率，特别是对于非标准命名格式
[guessit]
; 是否启用 GuessIt 增强识别
enabled = True
; 是否优先使用 GuessIt 结果（False 时以正则表达式为主，GuessIt 作为补充）
prefer_guessit = False

[emos]
auth_token = 
base_url = https://emos.best
; 文件存储类型: internal (内部存储) 或 global (全局存储)
file_storage = internal
; 分片大小(MB)，范围: 10-200，默认: 50
chunk_size_mb = 200

; 天翼云盘配置
[cloud189]
; 用户名（手机号）和密码方式登录
username = 
password = 
; 或者使用 SSO Cookie 登录（与用户名密码二选一）
cookie = 
; 根目录文件夹ID，-11 为根目录
parent_folder_id = -11
; 家庭云ID（留空则上传到个人云，填写则上传到家庭云）
; 可通过网页端 F12 开发者工具查看家庭云ID
family_id = 
; 并发上传线程数，默认 5
max_workers = 5
; STRM 服务器地址，用于生成播放链接
strm_server = http://192.168.2.148:5000
; STRM 文件输出目录，留空则不生成 STRM 文件
strm_output_dir = 
; 上传完成后是否删除云端文件，默认 False
delete_after = True
; 上传完成后是否清空回收站，默认 False
empty_recycle_bin = True
; 上传完成后是否清空回收站，默认 False
empty_recycle_bin = True
; STRM 文件输出目录（留空则不生成）
strm_output_dir = 

[processing]
; 上传目标: emos, p123, cloud189, yun139
; 支持多选，用逗号分隔，例如: emos,p123,cloud189
; 特殊值: both = emos+p123, all = emos+p123+cloud189+yun139
upload_targets = emos
delete_after_upload = True
; 最大并发上传工作线程数，默认1（顺序上传），可根据资源情况调整
max_upload_workers = 3

[logging]
log_level = INFO
log_file = 
console_log = True
file_log = False

; Emos 三方识别配置
[emos_recognition]
; 是否启用 Emos 识别
enabled = True
; Emos 识别 API 地址
api_url = https://emos.prlo.de/api/recognize
; 请求超时时间（秒）
timeout = 30
; 识别优先级：1-高（优先使用 Emos），2-中（Emos 失败后使用 TMDB），3-低（TMDB 失败后使用 Emos）
priority = 1

; aria2 下载器配置
[downloader.aria2]
type = aria2
; RPC 地址
rpc_url = http://192.168.1.16:6800/jsonrpc
; RPC 密钥
secret = your_secret_token
; 监控模式: polling (轮询), websocket (WebSocket实时), webhook (Webhook回调)
; - polling: 定时轮询 aria2 获取已完成的下载（兼容性最好）
; - websocket: 通过 WebSocket 实时接收下载完成事件（推荐，高效）
; - webhook: 通过 HTTP 接口接收 aria2 通知（需要配置 aria2 的 on-download-complete）
monitor_mode = polling
; 路径映射：将 aria2 返回的路径映射到主机实际路径
; 格式: 下载器路径:本地路径（多个用逗号分隔）
; 示例（Docker 场景）: /downloads:F:\Downloads,/data:D:\Data
; 示例（远程服务器）: /mnt/downloads:\\\192.168.1.100\downloads
; 本机运行时无需配置
; path_mappings = /downloads:F:\Downloads
; WebSocket 断线重连延迟（秒）
websocket_reconnect_delay = 5

[downloader.qbittorrent]
type = qbittorrent
rpc_url = http://192.168.1.16:8091/api/v2
username = admin
password = 123456

[telegram]
; Telegram Bot 配置，用于推送上传进度
; bot_token = 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
; chat_id = -1001234567
; channel_chat_id = -1001234568  ; 频道ID，用于发送上传完成的JSON消息（供自动下载系统解析）

; emya 数据库配置（用于视频入库）
[emya_db]
; 是否启用 emya 入库功能
enabled = False
; 数据库主机地址
host = localhost
; 数据库端口
port = 3306
; 数据库用户名
user = root
; 数据库密码
password = 
; 数据库名称
database = emya
; 字符集
charset = utf8mb4
; 连接池大小
pool_size = 5
; 最大溢出连接数
max_overflow = 10
; 连接回收时间(秒)
pool_recycle = 3600
; 默认用户ID（用于标识上传者）
default_user_id = 1
; 默认电视剧媒体库名称
default_tv_library = 电视剧
; 默认电影媒体库名称
default_movie_library = 电影

[cloud189]
username =
password =
cookie =
parent_folder_id = -11
max_workers = 5

; 中国移动云盘（139云盘）配置
[yun139]
; Base64编码的认证信息（从网页端获取）
authorization = 
; 云盘类型: personal_new (新版个人云), personal (旧版个人云), family (家庭云), group (群组云)
cloud_type = personal_new
; 家庭云/群组云ID（仅当 cloud_type 为 family 或 group 时需要）
cloud_id = 
; 目标文件夹ID（重要！）
; 新版个人云需要填写真实的文件夹ID，不能用 / 或空字符串
; 获取方法：
; 1. 登录 https://yun.139.com
; 2. 打开浏览器开发者工具 (F12) -> 网络 -> 请求
; 3. 刷新页面，搜索 hcy/file/list
; 4. 查看请求响应中的 fileId 字段，这就是文件夹ID
; 根目录的ID类似: Fxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx 格式
parent_id = 
; 自定义分片大小(MB)，0为自动根据文件大小选择
custom_part_size = 0
; 并行上传视频数量（每个视频内分片串行上传，139云盘限制）
; 默认3，根据网络带宽调整
max_workers = 3
; STRM 服务器地址，用于生成播放链接
strm_server = http://192.168.2.148:5010
; STRM 文件输出目录，留空则不生成 STRM 文件
strm_output_dir = 
; 上传完成后是否删除云端文件，默认 False
delete_after = False