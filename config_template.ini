; emya 数据库配置（用于视频入库）
[emya_db]
; 是否启用 emya 入库功能
enabled = False
; 数据库主机地址
host = localhost
; 数据库端口
port = 3306
; 数据库用户名
user = root
; 数据库密码
password = 
; 数据库名称
database = emya
; 字符集
charset = utf8mb4
; 连接池大小
pool_size = 5
; 最大溢出连接数
max_overflow = 10
; 连接回收时间(秒)
pool_recycle = 3600
; 默认用户ID（用于标识上传者）
default_user_id = 1
; 默认电视剧媒体库名称
default_tv_library = 电视剧
; 默认电影媒体库名称
default_movie_library = 电影

[cloud189]
username =
password =
cookie =
parent_folder_id = -11
max_workers = 5

; 中国移动云盘（139云盘）配置
[yun139]
; Base64编码的认证信息（从网页端获取）
authorization = 
; 云盘类型: personal_new (新版个人云), personal (旧版个人云), family (家庭云), group (群组云)
cloud_type = personal_new
; 家庭云/群组云ID（仅当 cloud_type 为 family 或 group 时需要）
cloud_id = 
; 目标文件夹ID（重要！）
; 新版个人云需要填写真实的文件夹ID，不能用 / 或空字符串
; 获取方法：
; 1. 登录 https://yun.139.com
; 2. 打开浏览器开发者工具 (F12) -> 网络 -> 请求
; 3. 刷新页面，搜索 hcy/file/list
; 4. 查看请求响应中的 fileId 字段，这就是文件夹ID
; 根目录的ID类似: Fxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx 格式
parent_id = 
; 自定义分片大小(MB)，0为自动根据文件大小选择
custom_part_size = 0
; 并行上传视频数量（每个视频内分片串行上传，139云盘限制）
; 默认3，根据网络带宽调整
max_workers = 3
; STRM 服务器地址，用于生成播放链接
strm_server = http://192.168.2.148:5010
; STRM 文件输出目录，留空则不生成 STRM 文件
strm_output_dir = 
; 生成 STRM 后是否删除云端文件，默认 False
delete_after_strm = False