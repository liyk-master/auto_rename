# 视频文件自动重命名和组织工具 - 配置文件模板
# 复制此文件并命名为 config.ini 进行自定义配置

[monitoring]
# 要监控的目录（必填）
watch_dir = "D:\Downloads"

# 输出目录（必填）
output_dir = "D:\Videos"

# 支持的文件扩展名
# 多个扩展名用逗号分隔
# 例如: .mp4,.mkv,.avi,.wmv,.mov
# 默认支持常见视频格式
supported_extensions = .mp4,.mkv,.avi,.wmv,.mov

# 事件监听轮询间隔（秒）
# 仅在非轮询模式下有效
poll_interval = 1

# 是否使用轮询模式而非事件监听
# 对于网络共享或某些文件系统，建议启用轮询模式
use_polling = false

# 轮询模式下的扫描间隔（秒）
polling_interval = 5

[naming_rules]
# 电视剧命名格式
# 可用变量: {title}, {season}, {episode}, {episode_title}
tv_show = "{title} - S{season:02d}E{episode:02d} - {episode_title}"

# 电影命名格式
# 可用变量: {title}, {year}
movie = "{title} ({year})"

# 动画命名格式
# 可用变量: {title}, {episode}
anime = "{title} - {episode}"

# 简单命名格式（用于无法识别的文件）
# 可用变量: {title}
simple = "{title}"

[tmdb]
# TMDB API密钥（必填，才能获取元数据）
# 请访问 https://www.themoviedb.org/ 注册并获取API密钥
api_key = "YOUR_TMDB_API_KEY_HERE"

# 语言设置
# 支持的语言代码: https://developers.themoviedb.org/3/getting-started/languages
language = "zh-CN"

# 地区设置
# 影响搜索结果的排序和内容可用性
region = "CN"

# API请求失败后的重试次数
retry_count = 3

# API请求超时时间（秒）
timeout = 30

[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR
level = "INFO"

# 日志文件路径
# 如果留空，日志将只输出到控制台
file = "video_organizer.log"

# 日志文件最大大小（字节）
# 超过此大小将自动滚动到新文件
# 例如 10MB = 10485760
max_bytes = 10485760

# 保留的日志文件数量
backup_count = 5