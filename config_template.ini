[monitoring]
; watch_dir = /mnt/media/test
; watch_dir = F:\XunLeiDownLoad\FDM
; output_dir = /mnt/media/processed
; poll_interval = 10
supported_extensions = .mp4,.mkv,.avi,.mov,.wmv,.flv
; use_polling = False
; polling_interval = 5
; 路径映射：将下载器返回的路径映射到主机实际路径
; path_mappings = F:\\XunLeiDownLoad\\media:F:\\XunLeiDownLoad\\media

[naming]
; tv_show_format = {show_name}/Season {season:02d}/{show_name} - S{season:02d}E{episode:02d} - {episode_name}
; tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}
tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}{release_group_suffix}
movie_format = Movies/{show_name} ({year}) {tmdbid=tmdbid}/{show_name} {quality_tags}{release_group_suffix}
; anime_format = Anime/{show_name}/{show_name} - {episode:03d}
simple_format = {title}

[tmdb]
api_key = 
language = zh-CN
region = CN
retry_count = 3
timeout = 30

[llm_translation]
api_url = https://open.bigmodel.cn/api/paas/v4/chat/completions
api_key = 
model = GLM-4.5-Flash
enabled = False

; LLM 兜底识别配置
; 当正则表达式无法识别文件名时，使用 LLM 进行兜底识别
[llm_fallback]
; 是否启用 LLM 兜底识别（需要先启用 llm_translation.enabled）
enabled = False
; 最大并发 LLM 调用数（避免 API 限流），建议 1-3
max_concurrent = 2

[emos]
auth_token = 
base_url = https://emos.best
; 文件存储类型: internal (内部存储) 或 global (全局存储)
file_storage = internal
; 分片大小(MB)，范围: 10-200，默认: 50
chunk_size_mb = 200

; 天翼云盘配置
[cloud189]
; 用户名（手机号）和密码方式登录
username = 
password = 
; 或者使用 SSO Cookie 登录（与用户名密码二选一）
cookie = 
; 根目录文件夹ID，-11 为根目录
parent_folder_id = -11
; 家庭云ID（留空则上传到个人云，填写则上传到家庭云）
; 可通过网页端 F12 开发者工具查看家庭云ID
family_id = 
; 并发上传线程数，默认 5
max_workers = 5
; STRM 服务器地址，用于生成播放链接
strm_server = http://192.168.2.148:5000
; STRM 文件输出目录，留空则不生成 STRM 文件
strm_output_dir = 
; 生成 STRM 后是否删除云端文件，默认 False
delete_after_strm = True
; STRM 文件输出目录（留空则不生成）
strm_output_dir = 

[processing]
; 上传目标: emos, p123, cloud189, yun139
; 支持多选，用逗号分隔，例如: emos,p123,cloud189
; 特殊值: both = emos+p123, all = emos+p123+cloud189+yun139
upload_targets = emos
delete_after_upload = True
; 最大并发上传工作线程数，默认1（顺序上传），可根据资源情况调整
max_upload_workers = 3

[logging]
log_level = INFO
log_file = 
console_log = True
file_log = False

; Emos 三方识别配置
[emos_recognition]
; 是否启用 Emos 识别
enabled = True
; Emos 识别 API 地址
api_url = https://emos.prlo.de/api/recognize
; 请求超时时间（秒）
timeout = 30
; 识别优先级：1-高（优先使用 Emos），2-中（Emos 失败后使用 TMDB），3-低（TMDB 失败后使用 Emos）
priority = 1

