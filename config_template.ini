[monitoring]
; watch_dir = /mnt/media/test
; watch_dir = F:\XunLeiDownLoad\FDM
; output_dir = /mnt/media/processed
; poll_interval = 10
supported_extensions = .mp4,.mkv,.avi,.mov,.wmv,.flv
; use_polling = False
; polling_interval = 5
; 路径映射：将下载器返回的路径映射到主机实际路径
; path_mappings = F:\\XunLeiDownLoad\\media:F:\\XunLeiDownLoad\\media

[naming]
; tv_show_format = {show_name}/Season {season:02d}/{show_name} - S{season:02d}E{episode:02d} - {episode_name}
; tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}
tv_show_format = {show_name} ({year}) {tmdbid=tmdbid}/Season {season:02d}/{show_name} {season_episode} {quality_tags}{release_group_suffix}
movie_format = Movies/{show_name} ({year}) {tmdbid=tmdbid}/{show_name} {quality_tags}{release_group_suffix}
; anime_format = Anime/{show_name}/{show_name} - {episode:03d}
simple_format = {title}

[tmdb]
api_key = 
language = zh-CN
region = CN
retry_count = 3
timeout = 30

[llm_translation]
api_url = https://open.bigmodel.cn/api/paas/v4/chat/completions
api_key = 
model = GLM-4.5-Flash
enabled = True

; LLM 兜底识别配置
; 当正则表达式无法识别文件名时，使用 LLM 进行兜底识别
[llm_fallback]
; 是否启用 LLM 兜底识别（需要先启用 llm_translation.enabled）
enabled = True
; 最大并发 LLM 调用数（避免 API 限流），建议 1-3
max_concurrent = 2

[emos]
auth_token = 
base_url = https://emos.best
; 文件存储类型: internal (内部存储) 或 global (全局存储)
file_storage = internal
; 分片大小(MB)，范围: 10-200，默认: 50
chunk_size_mb = 200

[processing]
upload_targets = emos  # emos, p123, 或 both
delete_after_upload = True
; 最大并发上传工作线程数，默认1（顺序上传），可根据资源情况调整
max_upload_workers = 3

[logging]
log_level = INFO
log_file = 
console_log = True
file_log = False

