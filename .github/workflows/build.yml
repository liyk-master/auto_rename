name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, dev-upload123pan, feature/llm-tmdb-fallback ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
          - os: macos-latest
            platform: macos
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --console \
          --name "VideoOrganizer-${{ matrix.platform }}" \
          --add-data "config_template.ini:." \
          --add-data "src/video_organizer/web/static:video_organizer/web/static" \
          --paths src \
          --clean \
          run_organizer.py

    - name: List build artifacts
      shell: bash
      run: |
        ls -la dist/

    - name: Test executable
      shell: bash
      run: |
        chmod +x dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} 2>/dev/null || true
        ./dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} --help || echo "Executable created (help may exit non-zero)"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VideoOrganizer-${{ matrix.platform }}
        path: dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }}
        retention-days: 30

    - name: Prepare release files
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p release
        cp dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} release/
        cp config_template.ini release/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
