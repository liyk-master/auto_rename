name: Build Cross-Platform Executables

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version tag
      id: version
      run: |
        git fetch --tags --force
        latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -1)
        if [ -z "$latest_tag" ]; then
          echo "new_tag=v1.0.0" >> $GITHUB_OUTPUT
        else
          major=$(echo $latest_tag | cut -d. -f1)
          minor=$(echo $latest_tag | cut -d. -f2)
          patch=$(echo $latest_tag | cut -d. -f3)
          new_patch=$((patch + 1))
          echo "new_tag=${major}.${minor}.${new_patch}" >> $GITHUB_OUTPUT
        fi

    - name: Create and push tag
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git tag ${{ steps.version.outputs.new_tag }}
        git push origin ${{ steps.version.outputs.new_tag }}

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
          - os: macos-latest
            platform: macos
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies (Linux)
      if: startsWith(matrix.platform, 'linux')
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --console \
          --name "VideoOrganizer-${{ matrix.platform }}" \
          --add-data "config_template.ini:." \
          --add-data "src/video_organizer/web/static:video_organizer/web/static" \
          --paths . \
          --clean \
          run_organizer.py

    - name: Install tray build dependencies (Windows)
      if: matrix.platform == 'windows'
      run: |
        pip install pystray Pillow

    - name: Build Windows tray launcher
      if: matrix.platform == 'windows'
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --windowed \
          --name "VideoOrganizer-windows-tray" \
          --add-data "config_template.ini;." \
          --add-data "src/video_organizer/web/static;video_organizer/web/static" \
          --paths . \
          --clean \
          --hidden-import pystray \
          --hidden-import PIL \
          src/video_organizer/win_launcher.py

    - name: List build artifacts
      shell: bash
      run: |
        ls -la dist/

    - name: Test executable
      shell: bash
      run: |
        chmod +x dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} 2>/dev/null || true
        ./dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} --help || echo "Executable created (help may exit non-zero)"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VideoOrganizer-${{ matrix.platform }}
        path: |
          dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }}
          dist/VideoOrganizer-windows-tray.exe
        retention-days: 30

    - name: Prepare release files
      if: needs.version.outputs.new_tag != ''
      run: |
        mkdir -p release
        cp dist/VideoOrganizer-${{ matrix.platform }}${{ matrix.ext }} release/
        if [ -f dist/VideoOrganizer-windows-tray.exe ]; then
          cp dist/VideoOrganizer-windows-tray.exe release/
        fi
        cp config_template.ini release/

    - name: Create Release
      if: needs.version.outputs.new_tag != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version.outputs.new_tag }}
        files: release/*
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/auto_rename:${{ needs.version.outputs.new_tag }}
          ${{ secrets.DOCKER_USERNAME }}/auto_rename:latest
