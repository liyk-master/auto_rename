name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, dev-upload123pan ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            platform: linux
            builder: pyinstaller
            ext: ""
            python-version: '3.9'
          - os: ubuntu-20.04
            platform: linux
            builder: nuitka
            ext: ""
            python-version: '3.9'
          - os: windows-latest
            platform: windows
            builder: pyinstaller
            ext: ".exe"
            python-version: '3.9'
          - os: macos-latest
            platform: macos
            builder: pyinstaller
            ext: ""
            python-version: '3.9'

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install create-dmg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install PyInstaller
      if: matrix.builder == 'pyinstaller'
      run: pip install pyinstaller>=5.0.0

    - name: Install Nuitka
      if: matrix.builder == 'nuitka'
      run: pip install nuitka>=1.0.0

    - name: Build with PyInstaller
      shell: bash
      if: matrix.builder == 'pyinstaller'
      run: |
        pyinstaller --noconfirm --onefile --console --name "VideoOrganizer-ubuntu20-${{ matrix.platform }}" --clean --hidden-import=src.video_organizer run_organizer.py

    - name: Build with Nuitka
      shell: bash
      if: matrix.builder == 'nuitka'
      run: |
        python -m nuitka --standalone --onefile --follow-imports --include-module=src.video_organizer --output-filename=VideoOrganizer-ubuntu20-${{ matrix.platform }}${{ matrix.ext }} run_organizer.py

    - name: List build artifacts
      run: |
        ls -la dist/
        file dist/* || true

    - name: Test executable (Linux)
      if: matrix.platform == 'linux'
      shell: bash
      run: |
        chmod +x dist/VideoOrganizer-ubuntu20-${{ matrix.platform }} && ./dist/VideoOrganizer-ubuntu20-${{ matrix.platform }} --help || echo "Help command failed, but executable was created"

    - name: Test executable (Windows)
      if: matrix.platform == 'windows'
      shell: bash
      run: |
        dist/VideoOrganizer-ubuntu20-${{ matrix.platform }}${{ matrix.ext }} --help || echo "Help command failed, but executable was created"

    - name: Test executable (macOS)
      if: matrix.platform == 'macos'
      shell: bash
      run: |
        chmod +x dist/VideoOrganizer-ubuntu20-${{ matrix.platform }} && ./dist/VideoOrganizer-ubuntu20-${{ matrix.platform }} --help || echo "Help command failed, but executable was created"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VideoOrganizer-ubuntu20-${{ matrix.platform }}-${{ matrix.builder }}
        path: |
          dist/VideoOrganizer*
        retention-days: 30

    - name: Prepare release files
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir release
        cp dist/VideoOrganizer* release/
        cd release
        if [ "${{ matrix.platform }}" = "windows" ]; then
          zip -r VideoOrganizer-ubuntu20-${{ matrix.platform }}-${{ matrix.builder }}.zip *
        else
          tar -czf VideoOrganizer-ubuntu20-${{ matrix.platform }}-${{ matrix.builder }}.tar.gz *
        fi
        cd ..

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.zip
          release/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu18-docker:
    runs-on: ubuntu-latest
    container: ubuntu:18.04

    steps:
    - name: Install system dependencies
      run: |
        apt-get update && apt-get install -y \
            python3.9 python3.9-dev python3.9-venv python3-pip \
            build-essential git && \
            ln -sf /usr/bin/python3.9 /usr/bin/python && \
            rm -rf /var/lib/apt/lists/*

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller>=5.0.0
        pip install -r requirements.txt

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --console --name "VideoOrganizer-ubuntu18-linux" --clean --hidden-import=src.video_organizer run_organizer.py

    - name: Check dependencies
      shell: bash
      run: |
        ldd dist/VideoOrganizer-ubuntu18-linux | head -10 && file dist/VideoOrganizer-ubuntu18-linux

    - name: Upload Ubuntu 18.04 build
      uses: actions/upload-artifact@v4
      with:
        name: VideoOrganizer-ubuntu18-linux
        path: dist/VideoOrganizer-ubuntu18-linux
        retention-days: 30