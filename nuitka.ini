[nuitka]
# Nuitka 配置文件
# 用于优化静态编译和减少输出大小

[onefile]
# 压缩可执行文件（需要 Python 3.8+）
compression = true

[standalone]
# 优化路径
nofollow-import-to =
    tests
    __pycache__
    .git

[module]
# 排除不需要的模块
no-deprecation-warnings = true

[llvm]
# 如果可用，使用 LLVM 后端（更快）
# on = auto

[windows]
# Windows 特定选项（如果需要）
# win-disable-console = false
# win-icon = icon.ico

[linux]
# Linux 特定选项
# lto = auto
